services:
  teacher-api:
    build:
      context: ./teacher_api
      dockerfile: Dockerfile
    ports:
      - "9000:80"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: EHEI_DB
      DB_USER: root
      DB_PASSWORD: 12345678
    volumes:
      - ./teacher_api/src:/var/www/html

  # teacher-ui:
  #   build:
  #     context: ./teacher-ui
  #     args:
  #       NEXT_PUBLIC_API_URL: http://localhost:9000
  #       NEXT_PUBLIC_ENV: local
  #   ports:
  #     - "3000:3000"

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: EHEI_DB
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  chat-server:
    build:
      context: ./chat-app
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}

volumes:
  mysql-data:
