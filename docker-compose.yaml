services:
  server:
    build:
      context: ./teacher
      dockerfile: Dockerfile
    ports:
      - "9000:80"
    depends_on:
      mysql:
        condition: service_healthy

    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: EHEI_DB
      DB_USER: root
      DB_PASSWORD: 12345678
    volumes:
      - ./teacher/src:/var/www/html

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: EHEI_DB
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p12345678",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
