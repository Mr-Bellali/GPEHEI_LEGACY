services:
  server:
    build:
      context: ./admin
      dockerfile: Dockerfile
    ports:
      - "9000:80"
    depends_on:
      - mysql
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: my_database
      DB_USER: root
      DB_PASSWORD: my-secret-pw

  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: my-secret-pw
      MYSQL_DATABASE: my_database
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  chat-server:
    build:
      context: ./chat-app
      dockerfile: Dockerfile
    ports:
      - "8080:8080"

volumes:
  mysql-data: